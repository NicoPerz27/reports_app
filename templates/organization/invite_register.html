{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-6">
        <div class="card p-5 border-0 shadow-sm">
            <div class="text-center mb-4">
                <h2 class="h3">Invitación a Grupo</h2>
                <h3 class="h4 text-primary">{{ group.name }}</h3>
                <p class="text-muted">{{ group.congregation.name }}</p>

                <div class="alert alert-info">
                    Te estás registrando como: <strong>{{ role_name }}</strong>
                </div>
            </div>

            <form method="post">
                {% csrf_token %}

                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} small">
                    {{ message }}
                </div>
                {% endfor %}
                {% endif %}

                <div class="mb-3">
                    <label for="name" class="form-label">Nombre Completo</label>
                    <input type="text" name="name" class="form-control" id="name" required placeholder="Ej. Juan Pérez">
                </div>

                <div class="mb-3">
                    <label for="username" class="form-label">Nombre de Usuario</label>
                    <input type="text" name="username" class="form-control" id="username" required
                        placeholder="Para iniciar sesión">
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" id="password" required>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg">Registrar y Acceder</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
