{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <h1 class="h3 font-weight-normal">Iniciar Sesión</h1>
                    <p class="text-muted">Sistema S-21-S</p>
                </div>

                <form method="post">
                    {% csrf_token %}

                    {% if form.errors %}
                    <div class="alert alert-danger small">
                        Usuario o contraseña incorrectos.
                    </div>
                    {% endif %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label">Usuario</label>
                        <input type="text" name="username" class="form-control form-control-lg" id="id_username"
                            required autofocus>
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control form-control-lg" id="id_password"
                            required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-light text-center py-3">
                <small class="text-muted">¿Olvidó su contraseña? Contacte a su administrador.</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
